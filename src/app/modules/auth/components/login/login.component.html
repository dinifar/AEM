<div class="login-page d-flex align-items-center justify-content-center">
  <div class="login-card">
    
    <div class="card-header-title">
      Sign in 
    </div>

    <div class="card-body-content">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        
        <div class="form-group mb-3">
          <input 
            type="email" 
            formControlName="username" 
            class="form-control custom-input"
            [ngClass]="{ 'is-invalid': loginForm.get('username')?.touched && loginForm.get('username')?.invalid }"
            placeholder="Username"
          />
          <div class="invalid-feedback">
            <span *ngIf="loginForm.get('username')?.errors?.['required']">Username is required.</span>
            <span *ngIf="loginForm.get('username')?.errors?.['email']">Please enter a valid email address.</span>
          </div>
        </div>

        <div class="form-group mb-4">
          <input 
            type="password" 
            formControlName="password" 
            class="form-control custom-input"
            [ngClass]="{ 'is-invalid': loginForm.get('password')?.touched && loginForm.get('password')?.invalid }"
            placeholder="Password"
          />
          <div class="invalid-feedback">
            <span *ngIf="loginForm.get('password')?.errors?.['required']">Password is required.</span>
          </div>
        </div>

        <div class="text-start">
          <button 
            type="submit" 
            class="btn btn-signin text-uppercase fw-bold" 
            [disabled]="loginForm.invalid">
            Sign In
          </button>
        </div>

      </form>
    </div>

  </div>
</div>
